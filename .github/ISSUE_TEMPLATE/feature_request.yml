name: Feature Request
description: Suggest a new feature or improvement
labels: ["kind/feature"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve, not just the solution you want.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Code examples are welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives have you tried?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - cargo-arxml (codegen)
        - ara-com (core traits)
        - ara-com-someip (transport)
        - Documentation
        - CI / Build
        - Other
    validations:
      required: true
